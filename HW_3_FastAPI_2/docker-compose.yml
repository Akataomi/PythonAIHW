version: '3.8'

services:
  # 🔹 FastAPI приложение
  app:
    build: .
    container_name: url-shortener-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/shortener.db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your_super_secret_key_change_this}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    volumes:
      - ./data:/app/data  # Сохранение БД между перезапусками
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - shortener-network

  # 🔹 Redis для кэширования
  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data  # Сохранение данных Redis
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - shortener-network

  # 🔹 (Опционально) Redis Commander для просмотра кэша
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: url-shortener-redis-ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - shortener-network
    profiles:
      - tools

volumes:
  redis-data:

networks:
  shortener-network:
    driver: bridge